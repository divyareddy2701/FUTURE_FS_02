<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mini CRM — Lead Management</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ===== LOGIN VIEW ===== -->
<div id="login-view" class="login-screen">
  <form id="login-form" class="login-card">
    <h1>Mini CRM</h1>
    <p class="subtitle">Admin sign in</p>
    <label for="login-username">Username</label>
    <input type="text" id="login-username" required autocomplete="username" />
    <label for="login-password">Password</label>
    <input type="password" id="login-password" required autocomplete="current-password" />
    <button type="submit" class="btn-primary">Sign In</button>
    <p id="login-error" class="error-text"></p>
  </form>
</div>

<!-- ===== DASHBOARD VIEW ===== -->
<div id="dashboard-view" class="hidden">
  <header class="topbar">
    <div class="brand">Mini <span>CRM</span></div>
    <div class="topbar-right">
      <span id="current-user"></span>
      <button id="logout-btn" class="btn-ghost">Log out</button>
    </div>
  </header>

  <main class="wrap">
    <section class="toolbar">
      <div class="toolbar-left">
        <input type="text" id="search-input" placeholder="Search by name or email..." />
        <select id="status-filter">
          <option value="">All statuses</option>
          <option value="NEW">New</option>
          <option value="CONTACTED">Contacted</option>
          <option value="CONVERTED">Converted</option>
          <option value="LOST">Lost</option>
        </select>
      </div>
      <button id="new-lead-btn" class="btn-primary">+ New Lead</button>
    </section>

    <section id="leads-table-wrap">
      <table id="leads-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Source</th>
            <th>Status</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="leads-tbody">
          <!-- rows injected by app.js -->
        </tbody>
      </table>
      <p id="empty-state" class="empty-state hidden">No leads yet. Click "New Lead" to add one.</p>
    </section>
  </main>
</div>

<!-- ===== LEAD MODAL (create/edit) ===== -->
<div id="lead-modal" class="modal hidden">
  <div class="modal-card">
    <h2 id="modal-title">New Lead</h2>
    <form id="lead-form">
      <input type="hidden" id="lead-id" />
      <label for="lead-name">Name</label>
      <input type="text" id="lead-name" required />
      <label for="lead-email">Email</label>
      <input type="email" id="lead-email" required />
      <label for="lead-phone">Phone</label>
      <input type="text" id="lead-phone" />
      <label for="lead-source">Source</label>
      <select id="lead-source">
        <option>Website Contact Form</option>
        <option>Referral</option>
        <option>Social Media</option>
        <option>Walk-in</option>
        <option>Other</option>
      </select>
      <label for="lead-status">Status</label>
      <select id="lead-status">
        <option value="NEW">New</option>
        <option value="CONTACTED">Contacted</option>
        <option value="CONVERTED">Converted</option>
        <option value="LOST">Lost</option>
      </select>

      <div class="modal-actions">
        <button type="button" id="cancel-modal-btn" class="btn-ghost">Cancel</button>
        <button type="submit" class="btn-primary">Save Lead</button>
      </div>
      <p id="lead-form-error" class="error-text"></p>
    </form>

    <hr />

    <div id="notes-section" class="hidden">
      <h3>Follow-up Notes</h3>
      <div id="notes-list"></div>
      <form id="note-form">
        <textarea id="note-content" placeholder="Add a follow-up note..." required></textarea>
        <button type="submit" class="btn-ghost">Add Note</button>
      </form>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="js/app.js"></script>
</body>
</html>
